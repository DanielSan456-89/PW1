<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rockstar Games Social Club</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rockstar_Games_Logo.svg/1200px-Rockstar_Games_Logo.svg.png">
</head>

<body class="login-page">

    <header class="main-header simple">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rockstar_Games_Logo.svg/200px-Rockstar_Games_Logo.svg.png"
                        alt="Rockstar Games"></a>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rockstar_Games_Logo.svg/1200px-Rockstar_Games_Logo.svg.png"
                    alt="Rockstar" class="login-logo">
                <h1>Social Club</h1>
                <p>Entre na sua conta Rockstar Games</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="email">E-mail ou Nome de Usuário</label>
                    <input type="text" id="email" name="email" placeholder="nome@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Lembrar-me</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-full">Entrar</button>
            </form>

            <div class="login-divider">
                <span>ou</span>
            </div>

            <div class="social-login">
                <button class="btn-social btn-steam">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="Steam">
                    Entrar com Steam
                </button>
                <button class="btn-social btn-epic">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Epic_Games_logo.svg" alt="Epic">
                    Entrar com Epic Games
                </button>
                <button class="btn-social btn-playstation">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Playstation_logo_colour.svg"
                        alt="PSN">
                    Entrar com PSN
                </button>
                <button class="btn-social btn-xbox">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg" alt="Xbox">
                    Entrar com Xbox Live
                </button>
            </div>

            <div class="login-footer">
                <p>Não tem uma conta? <a href="#" class="signup-link">Criar conta</a></p>
                <p class="help-text">Ao entrar, você concorda com os <a href="#">Termos de Serviço</a> e <a
                        href="#">Política de Privacidade</a></p>
            </div>
        </div>
    </main>

    <footer class="login-footer-bottom">
        <p>© 2026 Take-Two Interactive Software, Inc.</p>
        <div class="footer-links">
            <a href="#">Privacidade</a>
            <a href="#">Termos</a>
            <a href="#">Suporte</a>
        </div>
    </footer>

</body>

</html>
